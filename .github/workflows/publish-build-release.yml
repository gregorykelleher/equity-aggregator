name: publish-build-release

on:
  schedule:
    - cron: "0 22 * * *"   # daily 22:00 UTC (after US market close)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: publish-build-release
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    environment: env
    env:
      UV_SYSTEM_PYTHON: 1
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.EQUITY_AGGREGATOR }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Sync environment
        run: uv sync --locked

      - name: Create .env file
        run: |
          cat <<EOF > .env
          EXCHANGE_RATE_API_KEY=${{ secrets.EXCHANGE_RATE_API_KEY }}
          INTRINIO_API_KEY=${{ secrets.INTRINIO_API_KEY }}
          OPENFIGI_API_KEY=${{ secrets.OPENFIGI_API_KEY }}
          EOF
          chmod 600 .env
          test -s .env || { echo "::error ::empty .env"; exit 1; }

      - name: Run live sanity tests
        env:
          UV_ENV_FILE: ".env"
        run: uv run pytest -m live -v

      - name: Restore previous data store
        run: bash scripts/restore_data_store.sh
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Equity Aggregator
        env:
          UV_ENV_FILE: ".env"
          DATA_STORE_DIR: "./data/data_store"
          LOG_DIR: "./data/logs"
        run: |
          rm -rf data/logs
          mkdir -p data/data_store data/logs
          uv run equity-aggregator --verbose seed

      - name: Clean and compact data store
        # Security-critical: object_cache holds pickled blobs (see cache.py). The
        # published DB is downloaded onto users' machines, so a shipped cache would
        # make pickle.loads an RCE vector. Never remove this step.
        run: |
          sqlite3 data/data_store/data_store.db \
            "DROP TABLE IF EXISTS object_cache; VACUUM;"

      - name: Generate dataset stats
        id: stats
        run: python3 scripts/update_readme_stats.py data/data_store/data_store.db README.md

      - name: Create canonical equities badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_AUTH }}
          gistID: ce6ce2d7e3c247c34aba66dedcd7ede3
          filename: canonical-equities-badge.json
          label: Canonical Equities
          message: ${{ steps.stats.outputs.count }}
          color: blue

      - name: Compress data store for release
        run: xz -9 -k data/data_store/data_store.db

      - name: Stage release assets
        run: |
          # Copy the timestamped log to a stable asset name so successive runs
          # overwrite (clobber) it rather than accumulating one log per night.
          LATEST_LOG=$(ls -t data/logs/equity_aggregator_*.log | head -1)
          cp "$LATEST_LOG" data/logs/equity_aggregator_latest.log

      - name: Publish Latest Canonical Equities Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Update the release in place - never delete it - so the published
          # data_store.db.xz is always present (no download 404 window, and a
          # cancelled run can't leave zero release).
          if ! gh release view latest-build-release >/dev/null 2>&1; then
            gh release create latest-build-release \
              --title latest-build-release \
              --notes "Latest automated build of canonical equities data" \
              --latest
          fi

          gh release upload latest-build-release \
            data/data_store/data_store.db.xz \
            data/logs/equity_aggregator_latest.log \
            --clobber

      - name: Commit updated coverage table
        run: |
          if git diff --quiet README.md; then
            echo "Coverage table unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update equity data coverage table [skip ci]"
          git pull --rebase --autostash origin master
          git push origin master
